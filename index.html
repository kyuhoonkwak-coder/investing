<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>주식투자</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 메인 페이지 레이아웃 */
    .main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--header-h));
      overflow: hidden;
    }

    /* 시장 지수 스트립 */
    .market-strip {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      height: 40px;
      overflow-x: auto;
    }
    .mstrip-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .mstrip-name { font-size: 11px; color: var(--text2); }
    .mstrip-value { font-size: 13px; font-weight: 700; color: var(--text); }
    .mstrip-change { font-size: 11px; font-weight: 600; }
    .mstrip-change.up   { color: var(--up); }
    .mstrip-change.down { color: var(--down); }
    .mstrip-sep { color: var(--border); }

    /* 메인 레이아웃: 좌측 목록 + 우측 상세 */
    .page-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    /* 좌측: 종목 목록 패널 */
    .stock-list-panel {
      width: 290px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .list-panel-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: #FAFCFF;
    }
    .list-search {
      width: 100%;
      padding: 7px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      margin-bottom: 8px;
      box-sizing: border-box;
      transition: border-color .15s;
    }
    .list-search:focus { border-color: var(--accent); }
    .list-filter-row { display: flex; gap: 4px; }
    .list-filter-btn {
      flex: 1;
      padding: 5px 0;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: none;
      color: var(--text2);
      cursor: pointer;
      transition: all .12s;
    }
    .list-filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .list-filter-btn:not(.active):hover { background: var(--bg3); color: var(--text); }
    .stock-list-body { flex: 1; overflow-y: auto; }
    .slist-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid transparent;
      transition: background .1s;
    }
    .slist-row:hover { background: var(--bg3); }
    .slist-row.active {
      background: #EEF6FF;
      border-left-color: var(--accent);
    }
    .slist-rank { font-size: 11px; color: var(--text3); width: 16px; text-align: center; flex-shrink: 0; }
    .slist-logo {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .slist-info { flex: 1; min-width: 0; }
    .slist-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .slist-code { font-size: 10px; color: var(--text3); }
    .slist-price-col { text-align: right; flex-shrink: 0; }
    .slist-price { font-size: 12px; font-weight: 600; color: var(--text); }
    .slist-change { font-size: 11px; }

    /* 우측: 종목 상세 패널 */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      padding: 20px 22px 60px;
      min-width: 0;
    }
    .detail-inner {
      max-width: 960px;
      width: 100%;
    }

    /* ===== 섹션 카드 공통 ===== */
    .dcard {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(30,100,220,.05);
    }

    /* ===== 헤더 카드 ===== */
    .dcard-hd { padding: 20px 22px 0; }
    .dchd-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 18px;
    }
    .detail-name-block { display: flex; align-items: center; gap: 14px; }
    .detail-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink: 0;
    }
    .detail-stock-name { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -.5px; }
    .detail-stock-meta { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; gap: 6px; }
    .detail-market-tag {
      background: var(--bg3); color: var(--text2);
      border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 600;
    }
    .detail-price-block { text-align: right; }
    .detail-current-price { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .detail-change { font-size: 13px; margin-top: 5px; font-weight: 600; }
    .detail-current-price.up   { color: var(--up); }
    .detail-current-price.down { color: var(--down); }
    .detail-current-price.flat { color: var(--text); }
    .detail-change.up   { color: var(--up); }
    .detail-change.down { color: var(--down); }

    /* 스탯 바 — 헤더 카드 하단 */
    .dchd-stats {
      display: flex;
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }
    .dchd-stats .modal-stat {
      flex: 1; min-width: 100px;
      background: none; border-radius: 0;
      border-right: 1px solid var(--border);
      padding: 12px 14px;
    }
    .dchd-stats .modal-stat:last-child { border-right: none; }
    .dchd-stats .modal-stat-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
    .dchd-stats .modal-stat-value { font-size: 12px; font-weight: 700; color: var(--text); }

    /* ===== 차트 카드 ===== */
    .dcard-chart { padding: 0; }
    .dcard-chart-tabs {
      display: flex;
      gap: 6px;
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      background: #FAFCFF;
    }
    #detailChart .chart-interactive-wrap { margin: 0; }
    #detailChart .chart-svg-wrap { background: #fff; }
    #detailChart .chart-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text3);
      padding: 5px 16px 12px;
    }

    /* ===== 하단 카드 공통 ===== */
    .dcard-tl {
      font-size: 13px; font-weight: 700; color: var(--text);
      padding: 15px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: #FAFCFF;
    }
    .dcard-bd { padding: 4px 0 6px; }

    /* 가격 테이블 개선 */
    #detailPriceTable .modal-price-tbl { table-layout: auto; }
    #detailPriceTable .modal-price-tbl th { padding: 8px 10px; background: transparent; white-space: nowrap; }
    #detailPriceTable .modal-price-tbl td { padding: 7px 10px; white-space: nowrap; }
    #detailPriceTable .modal-price-tbl tbody tr:nth-child(even) { background: var(--bg3); }

    /* 투자자 동향 개선 */
    #detailInvestor { padding: 14px 20px; }
    #detailInvestor .modal-investor-grid { display: flex; flex-direction: column; gap: 12px; }
    #detailInvestor .modal-inv-item { display: flex; align-items: center; gap: 10px; }
    #detailInvestor .modal-inv-label { width: 48px; font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
    #detailInvestor .modal-inv-qty { width: 90px; text-align: right; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    #detailInvestor .modal-inv-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    #detailInvestor .modal-inv-bar { height: 100%; border-radius: 3px; transition: width .4s ease; }

    /* ===== 상세 콘텐츠: 좌우 flex ===== */
    .detail-lr {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .detail-lr-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .detail-lr-side {
      width: 300px;
      flex-shrink: 0;
    }
    /* 하단 2열: 시세 + 투자자 */
    .detail-sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: start;
    }

    /* 가격 테이블 높이 제한 */
    .detail-sub-grid .dcard-bd {
      max-height: 300px;
      overflow-y: auto;
    }

    /* ===== 주문 카드 ===== */
    .order-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(30,100,220,.05);
      margin-top: 10px;
    }
    .order-card-hd {
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
      background: #FAFCFF;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .order-card-bd {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    /* 매수/매도 탭 */
    .order-bs-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }
    .order-bs-tab {
      padding: 9px 0;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: none;
      color: var(--text2);
      transition: all .15s;
    }
    .order-bs-tab.buy.active  { background: var(--up);   color: #fff; }
    .order-bs-tab.sell.active { background: var(--down); color: #fff; }
    /* 레이블 */
    .order-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      margin-bottom: 4px;
    }
    /* select */
    .order-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .order-select:focus { border-color: var(--accent); }
    /* 지정가/시장가 토글 */
    .order-price-type {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
    }
    .order-price-type-btn {
      padding: 7px 0;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      color: var(--text2);
      cursor: pointer;
      transition: all .12s;
    }
    .order-price-type-btn.active { background: #fff; border-color: var(--accent); color: var(--accent); }
    /* 입력 + 스텝 버튼 */
    .order-input-wrap {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
      transition: border-color .15s;
    }
    .order-input-wrap:focus-within { border-color: var(--accent); }
    .order-num-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 9px 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      min-width: 0;
      text-align: right;
    }
    .order-unit { font-size: 12px; color: var(--text3); padding: 0 8px 0 4px; flex-shrink: 0; }
    .order-step-btn {
      width: 30px;
      height: 38px;
      border: none;
      border-left: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .1s;
    }
    .order-step-btn:hover { background: var(--border); color: var(--text); }
    /* 퍼센트 버튼 */
    .order-pct-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-top: 4px;
    }
    .order-pct-btn {
      padding: 6px 0;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg3);
      color: var(--text2);
      cursor: pointer;
      transition: all .12s;
    }
    .order-pct-btn:hover { background: #E8EFFF; color: var(--accent); border-color: var(--accent); }
    /* 구분선 */
    .order-divider { height: 1px; background: var(--border); }
    /* 주문 가능 금액 */
    .order-avail { font-size: 11px; color: var(--text3); margin-top: 4px; padding-left: 2px; }
    /* 총액 입력: readonly */
    .order-total-input { background: var(--bg3) !important; color: var(--text2) !important; }
    /* 주문 결과 메시지 */
    .order-result-msg {
      padding: 10px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.5;
    }
    .order-result-msg.success { background: #E8F5E9; color: #2E7D32; }
    .order-result-msg.error   { background: #FFF0F0; color: var(--down); }

    /* 주문 버튼 */
    .order-submit-btn {
      width: 100%;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter .15s;
      background: #F04452;
      color: #fff;
    }
    .order-submit-btn:hover { filter: brightness(1.08); }
    .order-submit-btn.sell-mode { background: var(--down); }

    /* ===== 빈 상태 ===== */
    .empty-detail {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--text3);
      font-size: 14px;
      gap: 12px;
    }
    .empty-detail-icon { font-size: 48px; opacity: .4; }

    /* ===== 모바일 뒤로가기 버튼 (기본 숨김) ===== */
    .mobile-back-btn { display: none; }

    /* ===== 태블릿 (≤ 1024px) ===== */
    @media (max-width: 1024px) {
      .stock-list-panel { width: 240px; }
      .detail-panel { padding: 18px 18px 60px; }
      .detail-lr { flex-direction: column; }
      .detail-lr-side { width: 100%; }
    }

    /* ===== 모바일 (≤ 768px) ===== */
    @media (max-width: 768px) {

      /* 헤더 */
      .gnav { display: none; }
      .logo { font-size: 17px; margin-right: 0; }
      .header-inner { padding: 0 16px; }
      .btn-login { padding: 7px 14px; font-size: 12px; }

      /* 시장 스트립 */
      .market-strip { padding: 0 16px; gap: 14px; height: 36px; }
      .mstrip-sep { display: none; }
      .mstrip-change { display: none; }

      /* 패널 전환: 목록 ↔ 상세 */
      .stock-list-panel { width: 100%; border-right: none; }
      .stock-list-panel.mobile-hidden { display: none; }

      .detail-panel {
        padding: 14px 14px 80px;
        min-height: 0;
      }
      .detail-panel:not(.mobile-visible) { display: none; }
      .detail-panel.mobile-visible {
        display: block;
        animation: detailSlideIn .22s ease;
      }
      @keyframes detailSlideIn {
        from { opacity: 0; transform: translateX(16px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* 모바일 뒤로가기 버튼 */
      .mobile-back-btn {
        display: inline-flex !important;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: var(--accent);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        padding: 0;
        margin-bottom: 14px;
      }

      /* 상세 헤더 카드 */
      .dcard-hd { padding: 16px 16px 0; }
      .dchd-top { flex-direction: column; align-items: flex-start; gap: 10px; }
      .detail-price-block { text-align: left; }
      .detail-current-price { font-size: 24px; }
      .detail-change { font-size: 12px; }
      .detail-icon { width: 40px; height: 40px; font-size: 16px; }
      .detail-stock-name { font-size: 18px; }

      /* 스탯: 3열 */
      .dchd-stats { flex-wrap: wrap; }
      .dchd-stats .modal-stat {
        flex: 1 1 33%;
        min-width: calc(33% - 1px);
        padding: 10px 12px;
      }
      .dchd-stats .modal-stat:nth-child(3n) { border-right: none; }
      .dchd-stats .modal-stat:nth-child(n+4) { border-top: 1px solid var(--border); }

      /* 차트 */
      .dcard-chart-tabs { padding: 10px 14px 8px; }

      /* 하단 그리드: 단일 열 */
      .detail-lr { flex-direction: column; }
      .detail-lr-side { width: 100%; }
      .detail-sub-grid { grid-template-columns: 1fr; gap: 0; }

      /* 가격 테이블: 폰트 축소 */
      #detailPriceTable .modal-price-tbl { font-size: 11px; }
      #detailPriceTable .modal-price-tbl th,
      #detailPriceTable .modal-price-tbl td { padding: 6px 8px; white-space: nowrap; }

      /* 카드 패딩 축소 */
      .dcard { margin-bottom: 10px; }
      .dcard-tl { padding: 12px 14px 10px; }
      #detailInvestor { padding: 12px 14px; }
    }

    /* ===== 소형 폰 (≤ 420px) ===== */
    @media (max-width: 420px) {
      .mstrip-name { display: none; }
      #ms-kp200, #ms-kp200-chg,
      #ms-usd,   #ms-usd-chg { display: none; }
      .mstrip-item:nth-child(n+4) { display: none; }
      .detail-current-price { font-size: 22px; }
      .detail-panel { padding: 12px 12px 80px; }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/investing/" class="logo">📈 주식투자</a>
        <nav class="gnav">
          <a href="/investing/" class="gnav-item active">홈</a>
          <a href="#" class="gnav-item">내 계좌</a>
        </nav>
      </div>
      <div class="header-right">
        <button class="btn-login">로그인</button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- 시장 지수 스트립 -->
    <div class="market-strip">
      <div class="mstrip-item">
        <span class="mstrip-name">코스피</span>
        <span class="mstrip-value" id="ms-kospi">—</span>
        <span class="mstrip-change" id="ms-kospi-chg"></span>
      </div>
      <span class="mstrip-sep">|</span>
      <div class="mstrip-item">
        <span class="mstrip-name">코스닥</span>
        <span class="mstrip-value" id="ms-kosdaq">—</span>
        <span class="mstrip-change" id="ms-kosdaq-chg"></span>
      </div>
      <span class="mstrip-sep">|</span>
      <div class="mstrip-item">
        <span class="mstrip-name">코스피200</span>
        <span class="mstrip-value" id="ms-kp200">—</span>
        <span class="mstrip-change" id="ms-kp200-chg"></span>
      </div>
      <span class="mstrip-sep">|</span>
      <div class="mstrip-item">
        <span class="mstrip-name">원/달러</span>
        <span class="mstrip-value" id="ms-usd">—</span>
        <span class="mstrip-change" id="ms-usd-chg"></span>
      </div>
    </div>

    <!-- 메인 레이아웃 -->
    <div class="page-layout">

      <!-- 좌측: 종목 목록 -->
      <aside class="stock-list-panel">
        <div class="list-panel-head">
          <input type="text" id="listSearch" class="list-search" placeholder="🔍 종목 검색">
          <div class="list-filter-row">
            <button class="list-filter-btn active" data-type="volume">거래량</button>
            <button class="list-filter-btn" data-type="amount">거래대금</button>
            <button class="list-filter-btn" data-type="rise">급등</button>
            <button class="list-filter-btn" data-type="fall">급락</button>
          </div>
        </div>
        <div class="stock-list-body" id="stockList">
          <div style="padding:24px;text-align:center;color:var(--text3);font-size:12px">로딩 중…</div>
        </div>
      </aside>

      <!-- 우측: 종목 상세 -->
      <div class="detail-panel" id="detailPanel">
        <div class="empty-detail">
